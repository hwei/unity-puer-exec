prompt_id: prompt-b
prompt_source: openspec/changes/rerun-help-only-log-workflow-validation/task-prompt.md
record_kind: retrospective-summary
date: YYYY-MM-DD

model: <agent label>
project_path: F:\C3\unity-puer-exec-workspace\c3-client-tree2\Project
cli_entry_path: F:\C3\unity-puer-exec-workspace\unity-puer-exec\cli\python\unity_puer_exec.py

constraints:
  allowed:
    - published unity-puer-exec help surface
    - normal CLI execution against the target Unity project
  disallowed:
    - repository source in this product workspace
    - repository tests
    - OpenSpec change artifacts as task hints
    - command-level maintainer hints

help_queries:
  - order: 1
    command: <command>
    retained_exact_argv: true
    purpose: <why this help query mattered>

command_trace:
  - order: 1
    command: <command>
    retained_exact_argv: false
    purpose: <why this command was used>
    outcome: <what happened>

key_outputs:
  - source: <source>
    summary: <important evidence>

final_verification_path:
  used_cli_observation_surface: <true|false>
  used_direct_host_log_inspection: <true|false>
  summary: <how final confirmation was obtained>

checkpoint_usage:
  captured_log_offset: <true|false>
  used_start_offset: <true|false>
  summary: <how observation checkpointing was or was not used>

task_success: <pass|fail|blocked>
autonomy: <pass|fail>
efficiency: <clean|recoverable|poor>

human_intervention:
  level: <observed_only|non_decisive|decisive>
  summary: <operator observation or intervention>

modal_blocker:
  present: <true|false>
  type: <none|type>
  detected_by: <none|cli|human_observation>
  resolution: <none|resolution>

findings:
  - <discoverability or friction finding>

runtime_or_environment_notes:
  - <host issue, compile issue, timing issue, or none>

cleanup:
  status: <cleaned|already_clean|partial|residue_present|skipped>
  removed:
    - <removed-path>
  residue:
    - <remaining-path>

raw_transcript:
  status: <not-retained|temporary|retained>
  location: <none|path>
  note: <short note>

final_summary: <short run summary>
