schema: spec-driven
profile: core
delivery: both

context: |
  Repository: unity-puer-exec.
  Primary products: Unity package com.txcombo.unity-puer-exec and CLI unity-puer-exec.
  Validation host is external to this repository and is not the product source of truth.
  OpenSpec is the canonical governance and planning system.
  Use openspec/project.md for repository-wide context and openspec/specs/ for durable requirements.
  Temporary execution context is ephemeral; distill stable conclusions into specs, tests, or source.
  Repository Python entry points auto-load ./.env when needed.
  UNITY_PROJECT_PATH in the process environment overrides repository-local .env.

rules:
  proposal:
    - Keep proposals concise and state the capability split explicitly.
    - When migrating governance, distinguish project-wide guidance from durable testable requirements.
    - Do not recreate the legacy global roadmap tree inside a proposal.
  design:
    - Explain why content belongs in project.md versus openspec/specs/.
    - Call out migration risks when replacing legacy governance paths.
  specs:
    - Write normative SHALL or MUST requirements with at least one scenario each.
    - Keep repository workflow requirements separate from product CLI requirements.
    - Treat validation-host evidence as non-normative unless it becomes an explicit requirement.
  tasks:
    - Break tasks into one-session-sized steps that end in directly verifiable repository state.
    - Include validation and archive-readiness work when a change establishes new OpenSpec truth.
